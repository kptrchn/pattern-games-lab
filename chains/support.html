<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — Chains</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Serif+4:wght@300;400&display=swap');

    :root {
      --parchment: #f5f0e8;
      --ink: #2a1f0e;
      --brass: #b8922a;
      --iron: #4a4540;
      --dim: #7a6e5e;
      --rule: rgba(184, 146, 42, 0.25);
      --ruleStrong: rgba(184, 146, 42, 0.5);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--parchment);
      color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 16px;
      font-weight: 300;
      line-height: 1.75;
      overflow-x: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--rule);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--ink);
    }

    .header-logo img {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: block;
    }

    .header-logo span {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      letter-spacing: 0.06em;
    }

    header nav { display: flex; gap: 32px; }

    header nav a {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    header nav a:hover,
    header nav a.active { color: var(--brass); }

    /* ─── HERO ─── */
    .hero {
      padding: 80px 48px 64px;
      border-bottom: 1px solid var(--rule);
    }

    .hero-tag {
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--brass);
      margin-bottom: 16px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 8vw, 80px);
      font-weight: 600;
      line-height: 1.0;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .hero h1 .accent { color: var(--brass); }

    /* ─── MAIN ─── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 80px 48px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .support-intro {
      font-size: 16px;
      color: var(--dim);
      max-width: 460px;
      margin-bottom: 56px;
      font-style: italic;
    }

    /* Contact card */
    .contact-card {
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,0.35);
    }

    .envelope-icon {
      width: 56px;
      height: 56px;
      border: 1.5px solid var(--ruleStrong);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .envelope-icon svg {
      width: 26px;
      height: 26px;
      stroke: var(--brass);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-card p {
      color: var(--iron);
      font-size: 15px;
      max-width: 340px;
    }

    .email-link {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--brass);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
      transition: border-color 0.2s;
      word-break: break-all;
    }

    .email-link:hover { border-color: var(--brass); }

    .response-note {
      font-size: 12px;
      color: var(--dim);
      font-style: italic;
      letter-spacing: 0.04em;
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand { font-size: 13px; color: var(--dim); font-style: italic; }

    .footer-nav { display: flex; gap: 24px; }

    .footer-nav a {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-nav a:hover { color: var(--brass); }

    @media (max-width: 640px) {
      header, .hero, main, footer { padding-left: 20px; padding-right: 20px; }
      .contact-card { padding: 36px 24px; }
      footer { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <a href="../index.html" class="header-logo">
    <img src="icon.png" alt="Chains icon">
    <span>Chains</span>
  </a>
    <nav>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="support.html" class="active">Support</a>
  </nav>
</header>

<div class="hero">
  <p class="hero-tag">Help</p>
  <h1>SUP<span class="accent">PORT</span></h1>
</div>

<main>
  <p class="support-intro">For any questions or issues with Chains, reach out directly. We read every message.</p>

  <div class="contact-card">
    <div class="envelope-icon">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <polyline points="2,5 12,13 22,5"/>
      </svg>
    </div>
    <p>Drop us a line and we'll get back to you shortly.</p>
    <a href="mailto:your@email.com" class="email-link">katsiaryna.petruchenya@gmail.com</a>
    <span class="response-note">Typically responds within 24–48 hours</span>
  </div>
</main>

<footer>
  <span class="footer-brand">© 2026 Katsiaryna Games</span>
  <div class="footer-nav">
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="support.html" class="active">Support</a>
    </div>
</footer>

</body>
</html>
