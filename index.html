<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pattern Games Lab</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #0f0f10;
      color: #ffffff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 40px;
    }

    .card {
      background: #1a1a1c;
      border-radius: 16px;
      padding: 20px;
      max-width: 300px;
    }

    .game-title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    a {
      display: block;
      color: #ff3b30;
      text-decoration: none;
      margin: 6px 0;
      font-size: 14px;
    }

    .grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
  </style>

</head>
<body>

  <div class="container">

    <h1>Pattern Games Lab</h1>
    <p class="subtitle">Minimalist brain puzzle games studio</p>

    <div class="grid">

      <div class="card">
        <div class="game-title">Focus Circles</div>
        <a href="focus-circle/privacy.html">Privacy Policy</a>
        <a href="focus-circle/terms.html">Terms of Use</a>
        <a href="focus-circle/support.html">Support</a>
      </div>

    </div>

  </div>

</body>
</html>
